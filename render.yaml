services:
  - type: web
    name: hsg-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: MONGODB_URI
        sync: false  # set manually in Render dashboard
      - key: FRONTEND_URL
        value: https://quanlyxehsh.com
      - key: PORT
        value: 3000
